<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | TravelGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3a86ff;
            --primary-dark: #2563eb;
            --dark: #0f172a;
            --slate: #64748b;
            --light: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: white;
            width: 100%;
            max-width: 440px;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 12px;
            display: inline-block;
            text-decoration: none;
        }

        .auth-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--dark);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px; 
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
            background: #fbfcfe;
        }

        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(58, 134, 255, 0.1);
        }

        .btn-reset {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-reset:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        #msg {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            display: none;
            text-align: center;
        }

        .msg-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .msg-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="logo">TravelGO</a>
            <h1>Reset Password</h1>
            <p>Enter your new password below.</p>
        </div>

        <div id="msg"></div>

        <form id="resetForm">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-reset" id="resetSubmit">Reset Password</button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('msg').textContent = 'Invalid link. No token found.';
            document.getElementById('msg').className = 'msg-error';
            document.getElementById('msg').style.display = 'block';
            document.getElementById('resetForm').style.display = 'none';
        }

        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                alert('Passwords do not match!');
                return;
            }

            const btn = document.getElementById('resetSubmit');
            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await res.json();
                if (data.success) {
                    document.getElementById('msg').textContent = 'Password updated! Redirecting to login...';
                    document.getElementById('msg').className = 'msg-success';
                    document.getElementById('msg').style.display = 'block';
                    document.getElementById('resetForm').style.display = 'none';
                    setTimeout(() => window.location.href = '/login.html', 2000);
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert('Connection error.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        };
    </script>
</body>
</html>
