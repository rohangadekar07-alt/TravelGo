<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | TravelGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #3a86ff;
            --primary-dark: #2563eb;
            --secondary: #8338ec;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --slate: #64748b;
            --light: #f8fafc;
            --white: #ffffff;
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow: 0 10px 30px -5px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: var(--dark);
            line-height: 1.6;
        }

        /* Navbar Styling */
        nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 0 rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--dark);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--primary); }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-btn {
            padding: 10px 20px;
            border-radius: 12px;
            background: var(--light);
            color: var(--dark);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .nav-btn:hover { background: #e2e8f0; }
        .btn-logout { background: #fff1f2; color: var(--danger); }
        .btn-logout:hover { background: #ffe4e6; }

        @media (max-width: 600px) {
            nav { padding: 12px 15px; }
            .btn-back span { display: none; }
            .nav-btn { padding: 10px 14px; }
            .logo { font-size: 1.3rem; }
            .btn-logout { font-size: 0.75rem; padding: 8px 12px; }
            
            .header-main-info { padding: 0 20px 25px 20px; }
            .user-top-row { flex-direction: column; align-items: center; text-align: center; gap: 15px; }
            .user-meta h1 { font-size: 1.5rem; }
        }

        /* Compact Profile Header */
        .profile-card-pro {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .header-top {
            height: 100px;
            background: var(--gradient);
        }

        .header-main-info {
            padding: 0 40px 30px 40px;
            display: flex;
            flex-direction: column;
            margin-top: -50px;
        }

        .user-top-row {
            display: flex;
            align-items: flex-end;
            gap: 25px;
            margin-bottom: 25px;
        }

        .info-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
            background: #f8fafc;
            border-radius: var(--radius-md);
            border: 1px solid #f1f5f9;
        }

        .strip-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .strip-item i {
            width: 35px;
            height: 35px;
            background: var(--white);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .strip-text label {
            display: block;
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .strip-text span {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--dark);
        }

        /* Large Action Buttons */
        .section-toggles {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .toggle-card {
            flex: 1;
            background: var(--white);
            padding: 25px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 2px solid transparent;
        }

        .toggle-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .toggle-card.active {
            background: var(--primary);
            color: var(--white);
        }

        .toggle-card.active .icon-box {
            background: rgba(255,255,255,0.2);
            color: var(--white);
        }

        .toggle-card.active .toggle-text p {
            color: rgba(255,255,255,0.8);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background: #eff6ff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
            transition: 0.3s;
        }

        .toggle-text h3 {
            font-family: 'Outfit';
            font-size: 1.2rem;
            margin-bottom: 2px;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        #bookingsSection, #inquiriesSection {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .pro-item {
            padding: 24px;
            border-radius: var(--radius-md);
            background: var(--white);
            border: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .pro-item:hover {
            transform: translateY(-2px);
            border-color: rgba(58, 134, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
        }

        .item-info-main h4 {
            font-family: 'Outfit';
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .item-info-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .info-sub {
            font-size: 0.85rem;
            color: var(--slate);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .info-sub i { color: var(--primary); width: 14px; }

        .status-pill {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .status-paid { background: #ecfdf5; color: #059669; }
        .status-pending { background: #fffbeb; color: #d97706; }
        .status-sent { background: #eff6ff; color: #2563eb; }

        .receipt-action {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            transition: 0.2s;
        }

        .receipt-action:hover { text-decoration: underline; color: var(--secondary); }

        /* Buttons */
        .nav-btn {
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            border: 1.5px solid transparent;
        }

        .btn-back {
            background: var(--white);
            color: var(--dark);
            border-color: #e2e8f0;
            text-decoration: none;
        }
        .btn-back:hover { background: #f8fafc; border-color: var(--primary); color: var(--primary); }

        .btn-logout {
            background: #fee2e2;
            color: var(--danger);
        }
        .btn-logout:hover { background: #fecaca; transform: translateY(-2px); }

        .btn-edit-pro {
            background: #eff6ff;
            color: var(--primary);
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 5px;
        }

        /* Avatar Section Fix */
        .user-top-row {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 25px;
        }

        .avatar-container {
            position: relative;
            flex-shrink: 0;
            z-index: 10;
        }

        .avatar-huge {
            width: 140px;
            height: 140px;
            background: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.8rem;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            border: 6px solid var(--white);
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            background-size: cover;
            background-position: center;
            cursor: pointer;
            overflow: hidden;
            color: var(--primary);
            position: relative;
        }

        .upload-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .avatar-huge:hover .upload-overlay {
            opacity: 1;
        }

        .upload-overlay i {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .header-main-info { padding: 0 20px 30px 20px; }
            .user-top-row { 
                flex-direction: column; 
                align-items: center; 
                text-align: center; 
                gap: 15px; 
            }
            .user-meta h1 { font-size: 1.6rem; }
            .info-strip { grid-template-columns: 1fr; gap: 12px; padding: 15px; }
            .section-toggles { flex-direction: column; gap: 15px; }
            .toggle-card { padding: 18px; }
            .pro-item { flex-direction: column; align-items: flex-start; gap: 15px; }
            .item-status { width: 100%; display: flex; justify-content: space-between; align-items: center; }
            .btn-back span { display: none; }
            .nav-left .logo { font-size: 1.2rem; }
            .nav-btn { padding: 8px 12px; font-size: 0.8rem; }
        }

        @media (max-width: 480px) {
            .avatar-huge { width: 110px; height: 110px; font-size: 3rem; margin-top: -10px; }
            .header-top { height: 80px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="/" class="nav-btn btn-back">
                <i class="fas fa-arrow-left"></i> <span>Back to Home</span>
            </a>
            <a href="/" class="logo">Travel<span>GO</span></a>
        </div>
        <div class="nav-right">
            <button onclick="logout()" class="nav-btn btn-logout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <div class="container" style="max-width: 1000px; margin: 30px auto; padding: 0 20px;">
        <!-- Compact Profile Card -->
        <div class="profile-card-pro">
            <div class="header-top"></div>
            <div class="header-main-info">
                <div class="user-top-row">
                    <div class="avatar-container">
                        <div class="avatar-huge" id="avatarChar" onclick="document.getElementById('profileInput').click()">
                            <span id="initialChar">?</span>
                            <div class="upload-overlay">
                                <i class="fas fa-camera"></i>
                                <span>Change</span>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="profileInput" style="display: none;" accept="image/*" onchange="handleImageUpload(event)">
                    <div class="user-meta">
                        <h1 id="headerName" style="font-size: 1.8rem;">Loading...</h1>
                        <p id="headerEmail">...</p>
                        <button class="btn-edit-pro" style="margin-top: 10px;" onclick="updateProfile()">
                            <i class="fas fa-pen"></i> Edit Profile
                        </button>
                    </div>
                </div>

                <!-- Horizontal Info Strip -->
                <div class="info-strip">
                    <div class="strip-item">
                        <i class="fas fa-phone-alt"></i>
                        <div class="strip-text">
                            <label>Mobile</label>
                            <span id="detMobile">--</span>
                        </div>
                    </div>
                    <div class="strip-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <div class="strip-text">
                            <label>Address</label>
                            <span id="detAddress">--</span>
                        </div>
                    </div>
                    <div class="strip-item">
                        <i class="fas fa-shield-alt"></i>
                        <div class="strip-text">
                            <label>Security</label>
                            <span id="detLocation">Verified</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Large Toggle Buttons -->
        <div class="section-toggles">
            <div class="toggle-card active" id="toggle-bookings" onclick="switchTab('bookings')">
                <div class="icon-box">
                    <i class="fas fa-suitcase-rolling"></i>
                </div>
                <div class="toggle-text">
                    <h3>My Bookings</h3>
                    <p>Track your trips</p>
                </div>
            </div>
            <div class="toggle-card" id="toggle-inquiries" onclick="switchTab('inquiries')">
                <div class="icon-box">
                    <i class="fas fa-comment-dots"></i>
                </div>
                <div class="toggle-text">
                    <h3>My Inquiries</h3>
                    <p>View your queries</p>
                </div>
            </div>
        </div>

        <!-- Data Area -->
        <div class="pro-card" style="padding: 20px;">
            <div id="bookingsSection" class="list-container">
                <!-- Bookings go here -->
            </div>
            <div id="inquiriesSection" class="list-container" style="display: none;">
                <!-- Inquiries go here -->
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/register.html';
        }

        async function loadProfile() {
            try {
                // Load Bio
                const profileRes = await fetch('/api/user/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const profileData = await profileRes.json();

                if (profileData.success) {
                    const u = profileData.user;
                    document.getElementById('headerName').textContent = u.fullName;
                    document.getElementById('headerEmail').textContent = u.email;
                    document.getElementById('detMobile').textContent = u.mobileNumber;
                    document.getElementById('detAddress').textContent = u.address;
                    
                    const avatar = document.getElementById('avatarChar');
                    const initialChar = document.getElementById('initialChar');
                    
                    if (u.profileImage) {
                        avatar.style.backgroundImage = `url('${u.profileImage}')`;
                        initialChar.style.display = 'none';
                    } else {
                        initialChar.textContent = u.fullName.charAt(0).toUpperCase();
                        initialChar.style.display = 'block';
                    }
                    
                    if (u.liveLocation && u.liveLocation.latitude) {
                        document.getElementById('detLocation').textContent = 'Live Location Shared ✅';
                        document.getElementById('detLocation').style.color = '#15803d';
                    }
                } else {
                     // Token is valid but user no longer exists in DB (e.g. database reset)
                     localStorage.removeItem('token');
                     window.location.href = '/register.html';
                     return;
                }

                // Load History
                const historyRes = await fetch('/api/user/history', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const historyData = await historyRes.json();

                if (historyData.success) {
                    renderHistory(historyData.bookings, historyData.inquiries);
                }

            } catch (err) {
                console.error(err);
            }
        }

        function formatStatus(status) {
            if (status === 'Paid' || status === 'Awaiting Verification') return 'ONLINE PAID';
            if (status === 'Cash Pending') return 'CASH PENDING';
            if (status === 'Cash Confirmed') return 'CASH PAID';
            return status.toUpperCase();
        }

        function getStatusClass(status) {
            if (status === 'Paid' || status === 'Awaiting Verification' || status === 'Cash Confirmed') return 'status-paid';
            if (status === 'Cash Pending') return 'status-pending';
            return 'status-sent';
        }

        function renderHistory(bookings, inquiries) {
            const bCont = document.getElementById('bookingsSection');
            const iCont = document.getElementById('inquiriesSection');

            if (bookings.length === 0) {
                bCont.innerHTML = '<div style="text-align:center; padding:30px; color:var(--slate);">No bookings found yet. Explore our packages to book your first trip!</div>';
            } else {
                bCont.innerHTML = bookings.map(b => {
                    // Clean price to remove any redundant Rs
                    const cleanPrice = b.price.replace(/Rs/g, '').trim();
                    
                    return `
                    <div class="pro-item">
                        <div class="item-info-main">
                            <h4>${b.travelSpot} Holiday</h4>
                            <div class="item-info-row">
                                <span class="info-sub"><i class="far fa-calendar-alt"></i> ${new Date(b.travelDate).toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'})}</span>
                                <span class="info-sub"><i class="fas fa-fingerprint"></i> ID: ${b.bookingId || 'N/A'}</span>
                                <span class="info-sub" style="font-weight:700; color:var(--dark);"><i class="fas fa-rupee-sign"></i> ${cleanPrice}</span>
                            </div>
                            ${(b.paymentStatus === 'Paid' || b.paymentStatus === 'Cash Confirmed' || b.paymentStatus === 'Awaiting Verification') ? 
                                `<a href="/receipt.html?id=${b._id}" class="receipt-action"><i class="fas fa-file-pdf"></i> Download Receipt</a>` : ''
                            }
                        </div>
                        <div class="item-status">
                            <span class="status-pill ${getStatusClass(b.paymentStatus)}">${formatStatus(b.paymentStatus)}</span>
                        </div>
                    </div>
                `}).join('');
            }

            if (inquiries.length === 0) {
                iCont.innerHTML = '<div style="text-align:center; padding:30px; color:var(--slate);">You haven\'t sent any inquiries yet.</div>';
            } else {
                iCont.innerHTML = inquiries.map(i => `
                    <div class="pro-item">
                        <div class="item-info-main">
                            <h4>Enquiry for ${i.travelSpot}</h4>
                            <div class="item-info-row">
                                <span class="info-sub"><i class="far fa-calendar-check"></i> Travel Date: ${new Date(i.travelDate).toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'})}</span>
                                <span class="info-sub"><i class="far fa-clock"></i> Sent On: ${new Date(i.submittedAt).toLocaleDateString()}</span>
                            </div>
                        </div>
                        <div class="item-status">
                            <span class="status-pill status-sent">Query Sent</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        function switchTab(type) {
            const btnBookings = document.getElementById('toggle-bookings');
            const btnInquiries = document.getElementById('toggle-inquiries');
            const bookingsSection = document.getElementById('bookingsSection');
            const inquiriesSection = document.getElementById('inquiriesSection');

            if (type === 'bookings') {
                btnBookings.classList.add('active');
                btnInquiries.classList.remove('active');
                bookingsSection.style.display = 'flex';
                inquiriesSection.style.display = 'none';
            } else {
                btnInquiries.classList.add('active');
                btnBookings.classList.remove('active');
                bookingsSection.style.display = 'none';
                inquiriesSection.style.display = 'flex';
            }
        }

        async function updateProfile() {
            const currentMobile = document.getElementById('detMobile').textContent;
            const currentAddress = document.getElementById('detAddress').textContent;

            const { value: formValues } = await Swal.fire({
                title: '<span style="font-family:Outfit; font-weight:800;">Update Profile</span>',
                html: `
                    <div style="text-align: left; padding: 10px;">
                        <div style="margin-bottom: 20px;">
                            <label style="font-weight:800; font-size: 0.7rem; color: #64748b; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:8px;">
                                <i class="fas fa-phone-alt" style="margin-right:5px;"></i> Mobile Number
                            </label>
                            <input id="swal-mobile" type="tel" maxlength="10" class="swal2-input" placeholder="Enter 10-digit mobile" value="${currentMobile}" 
                                   style="margin:0; width:100%; border-radius:12px; font-family:Inter; font-weight:600;" 
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10)">
                        </div>
                        
                        <div>
                            <label style="font-weight:800; font-size: 0.7rem; color: #64748b; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:8px;">
                                <i class="fas fa-map-marker-alt" style="margin-right:5px;"></i> Home Address
                            </label>
                            <textarea id="swal-address" class="swal2-textarea" placeholder="Enter your full address" 
                                      style="margin:0; width:100%; border-radius:12px; min-height:100px; font-family:Inter; font-size:0.95rem;">${currentAddress}</textarea>
                        </div>
                    </div>
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'Save Changes',
                confirmButtonColor: '#3a86ff',
                cancelButtonColor: '#94a3b8',
                customClass: {
                    popup: 'premium-swal-popup',
                    confirmButton: 'premium-confirm-btn',
                    cancelButton: 'premium-cancel-btn'
                },
                preConfirm: () => {
                    const mobile = document.getElementById('swal-mobile').value;
                    const address = document.getElementById('swal-address').value;
                    
                    if (!mobile || mobile.length !== 10) {
                        Swal.showValidationMessage('Please enter a valid 10-digit mobile number');
                        return false;
                    }
                    if (!address || address.length < 5) {
                        Swal.showValidationMessage('Please enter a complete address');
                        return false;
                    }
                    
                    return { mobileNumber: mobile, address: address }
                }
            });

            if (formValues) {
                try {
                    Swal.fire({ title: 'Updating...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

                    const res = await fetch('/api/user/update-profile', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}` 
                        },
                        body: JSON.stringify(formValues)
                    });

                    const data = await res.json();
                    if (data.success) {
                        Swal.fire('Updated!', 'Your profile has been updated successfully.', 'success');
                        loadProfile(); // Refresh data on page
                    } else {
                        Swal.fire('Error', data.message || 'Update failed', 'error');
                    }
                } catch (err) {
                    console.error(err);
                    Swal.fire('Error', 'Connection error', 'error');
                }
            }
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const avatar = document.getElementById('avatarChar');
                avatar.style.backgroundImage = `url('${e.target.result}')`;
                document.getElementById('initialChar').style.display = 'none';
            };
            reader.readAsDataURL(file);

            const formData = new FormData();
            formData.append('profileImage', file);

            try {
                const res = await fetch('/api/user/upload-image', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await res.json();
                if (!data.success) {
                    Swal.fire({ icon: 'error', title: 'Upload Failed', text: data.message });
                }
            } catch (err) {
                console.error('Upload Error:', err);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        loadProfile();
    </script>
</body>
</html>
