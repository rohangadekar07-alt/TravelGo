<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TravelGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #3a86ff;
            --primary-dark: #2563eb;
            --dark: #0f172a;
            --slate: #64748b;
            --light: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        .btn-back-auth {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--slate);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .btn-back-auth:hover {
            color: var(--primary);
            transform: translateX(-4px);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: white;
            width: 100%;
            max-width: 440px;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 12px;
            display: inline-block;
            text-decoration: none;
        }

        .auth-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--slate);
            font-size: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--dark);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate);
            font-size: 1rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px; 
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.3s;
            background: #fbfcfe;
        }

        /* Specific padding for fields with left icons (Email) */
        .input-wrapper i:not(.toggle-password) + input {
            padding-left: 48px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(58, 134, 255, 0.1);
        }

        /* Specific padding for password field (right toggle only) */
        input[type="password"]#password {
            padding-right: 48px !important;
            padding-left: 16px !important;
        }

        .input-wrapper i.toggle-password {
            position: absolute !important;
            right: 16px !important;
            left: auto !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            cursor: pointer;
            color: var(--slate);
            font-size: 1rem;
            transition: 0.2s;
            z-index: 20;
            display: block !important;
        }

        /* Hide browser default eye icon completely */
        input::-ms-reveal,
        input::-ms-clear,
        input::-webkit-contacts-auto-fill-button,
        input::-webkit-credentials-auto-fill-button,
        input::-webkit-reveal {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(58, 134, 255, 0.2);
        }

        .auth-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.95rem;
            color: var(--slate);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        #msg {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            display: none;
            text-align: center;
        }

        .msg-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .msg-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.4s ease-out;
        }

        .modal h2 { font-family: 'Outfit', sans-serif; margin-bottom: 10px; }
        .modal p { color: var(--slate); font-size: 0.9rem; margin-bottom: 25px; }
        .btn-cancel { background: #eee; color: #555; margin-top: 10px; }

        .toast {
            position: fixed;
            top: 20px; right: -100%;
            background: white; color: var(--dark);
            padding: 16px 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; align-items: center; gap: 12px;
            font-weight: 500; font-family: 'Inter', sans-serif;
            z-index: 2000;
            transition: right 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-left: 4px solid var(--primary);
        }

        .toast.show { right: 20px; }
        .toast-error { border-left-color: #ef4444; }
        .toast-error i { color: #ef4444; }
        .toast-success { border-left-color: #10b981; }
        .toast-success i { color: #10b981; }

        @media (max-width: 480px) {
            body { padding: 15px; }
            .auth-card { padding: 30px 20px; border-radius: 20px; }
            .auth-header h1 { font-size: 1.5rem; }
            .logo { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <a href="/" class="btn-back-auth">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Home</span>
        </a>
        <div class="auth-header">
            <a href="/" class="logo">TravelGO</a>
            <h1>Welcome Back</h1>
            <p>Please enter your details to login</p>
        </div>

        <div id="msg"></div>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="far fa-envelope"></i>
                    <input type="email" id="email" placeholder="example@gmail.com" required autocomplete="off">
                </div>
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label>Password</label>
                    <a href="javascript:void(0)" onclick="openForgotModal()" style="font-size: 0.8rem; color: var(--primary); text-decoration: none;">Forgot?</a>
                </div>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="off">
                    <i class="far fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <span>Login</span>
                <i class="fas fa-sign-in-alt"></i>
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Create One</a>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <h2>Forgot Password</h2>
            <p id="forgotDesc">Enter your email to receive a 6-digit OTP.</p>
            
            <!-- Step 1: Request OTP -->
            <form id="forgotFormStep1">
                <div class="form-group" style="text-align: left;">
                    <label>Email Address</label>
                    <input type="email" id="forgotEmail" placeholder="your@email.com" required>
                </div>
                <button type="submit" class="btn-login" id="forgotSubmitStep1">
                    <span>Send OTP</span>
                </button>
                <button type="button" class="btn-login btn-cancel" onclick="closeForgotModal()">Cancel</button>
            </form>

            <!-- Step 2: Verify OTP & New Password -->
            <form id="forgotFormStep2" style="display: none;">
                <div class="form-group" style="text-align: left;">
                    <label>Enter 6-Digit OTP</label>
                    <input type="text" id="forgotOtp" placeholder="XXXXXX" maxlength="6" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>New Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="forgotNewPassword" placeholder="••••••••" required autocomplete="off">
                        <i class="far fa-eye toggle-password" id="toggleForgotNewPassword"></i>
                    </div>
                </div>
                <button type="submit" class="btn-login" id="forgotSubmitStep2">
                    <span>Reset Password</span>
                </button>
                <button type="button" class="btn-login btn-cancel" onclick="closeForgotModal()">Cancel</button>
            </form>
        </div>
    </div>

    <!-- Professional Toast Notification -->
    <div id="toast" class="toast">
        <i id="toastIcon" class="fas fa-check-circle"></i>
        <span id="toastMsg">Message</span>
    </div>

    <script>
        const msg = document.getElementById('msg');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const toggleForgotNewPassword = document.getElementById('toggleForgotNewPassword');
        const forgotNewPasswordInput = document.getElementById('forgotNewPassword');

        togglePassword.onclick = () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.classList.toggle('fa-eye');
            togglePassword.classList.toggle('fa-eye-slash');
        };

        toggleForgotNewPassword.onclick = () => {
            const type = forgotNewPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            forgotNewPasswordInput.setAttribute('type', type);
            toggleForgotNewPassword.classList.toggle('fa-eye');
            toggleForgotNewPassword.classList.toggle('fa-eye-slash');
        };

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            const formData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await res.json();

                if (data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Login Successful',
                        text: 'Welcome back! Redirecting...',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    
                    // Store token and user info
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Login Failed',
                        text: data.message
                    });
                }
            } catch (err) {
                msg.textContent = 'Connection error. Please try again.';
                msg.className = 'msg-error';
                msg.style.display = 'block';
            } finally {
                if (!window.location.href.includes('?success=true')) { // Don't reset if redirecting
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span>Login</span><i class="fas fa-sign-in-alt"></i>';
                }
            }
        };

        function openForgotModal() { 
            document.getElementById('forgotModal').style.display = 'flex'; 
            document.getElementById('forgotFormStep1').style.display = 'block';
            document.getElementById('forgotFormStep2').style.display = 'none';
            document.getElementById('forgotDesc').innerText = 'Enter your email to receive a 6-digit OTP.';
        }
        function closeForgotModal() { document.getElementById('forgotModal').style.display = 'none'; }

        let resetEmail = '';

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const toastIcon = document.getElementById('toastIcon');
            
            toastMsg.textContent = message;
            
            if (isError) {
                toast.classList.add('toast-error');
                toast.classList.remove('toast-success');
                toastIcon.className = 'fas fa-exclamation-circle';
            } else {
                toast.classList.add('toast-success');
                toast.classList.remove('toast-error');
                toastIcon.className = 'fas fa-check-circle';
            }
            
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3500);
        }

        document.getElementById('forgotFormStep1').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('forgotSubmitStep1');
            resetEmail = document.getElementById('forgotEmail').value;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: resetEmail })
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast('OTP sent to your email successfully!');
                    document.getElementById('forgotFormStep1').style.display = 'none';
                    document.getElementById('forgotFormStep2').style.display = 'block';
                    document.getElementById('forgotDesc').innerText = 'Enter the OTP and your new password.';
                } else {
                    showToast(data.message, true);
                }
            } catch (err) {
                showToast('Connection error. Try again.', true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Send OTP</span>';
            }
        };

        document.getElementById('forgotFormStep2').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('forgotSubmitStep2');
            const otp = document.getElementById('forgotOtp').value;
            const password = document.getElementById('forgotNewPassword').value;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: resetEmail, otp, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast('Password reset successfully! You can now login.');
                    closeForgotModal();
                    document.getElementById('forgotFormStep2').reset();
                    document.getElementById('forgotFormStep1').reset();
                } else {
                    showToast(data.message, true);
                }
            } catch (err) {
                showToast('Connection error. Try again.', true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Reset Password</span>';
            }
        };
    </script>
</body>
</html>
